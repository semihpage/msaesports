<!-- Sepet Modal -->
<div id="cartModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; backdrop-filter:blur(6px); background:rgba(0,0,0,0.4); justify-content:center; align-items:center;">
  <div style="background:#fff; border-radius:15px; padding:20px; width:90%; max-width:400px; max-height:80%; overflow-y:auto;">
    <h2>Sepetiniz</h2>
    <div id="cartItems"></div>
    <div id="cartTotal"></div>
    <button onclick="closeCart()" style="margin-top:10px; padding:10px 20px; border:none; border-radius:10px; background:red; color:#fff;">Kapat</button>
  </div>
</div>

<script>
let cart=JSON.parse(localStorage.getItem("userCart")||"[]");
function openCart(){ renderCart(); document.getElementById("cartModal").style.display="flex"; }
function closeCart(){ document.getElementById("cartModal").style.display="none"; }
function renderCart(){
  const cartDiv=document.getElementById("cartItems");
  cartDiv.innerHTML="";
  let total=0;
  cart.forEach((item,i)=>{
    total+=item.price;
    const div=document.createElement("div");
    div.style.display="flex"; div.style.justifyContent="space-between"; div.style.marginBottom="5px";
    div.innerHTML=`${item.name} - ${item.price} TL <button onclick="removeItem(${i})" style="background:red;color:#fff;border:none;border-radius:5px;">X</button>`;
    cartDiv.appendChild(div);
  });
  document.getElementById("cartTotal").textContent="Toplam: "+total+" TL";
}
function removeItem(i){ cart.splice(i,1); localStorage.setItem("userCart",JSON.stringify(cart)); renderCart();}
</script>

</body>
</html>
